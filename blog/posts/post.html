<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ブログ｜食堂 西のうめぼし</title>
  <meta name="description" content="食堂 西のうめぼしのブログ記事">
  <link rel="canonical" id="canonical-url" href="https://www.nishinoumeboshi.com/blog/posts/post.html">

  <!-- OGP（JSで動的に上書き） -->
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="食堂 西のうめぼし">
  <meta id="og-title" property="og:title" content="ブログ｜食堂 西のうめぼし">
  <meta id="og-description" property="og:description" content="食堂 西のうめぼしのブログ記事">
  <meta id="og-url" property="og:url" content="https://www.nishinoumeboshi.com/blog/">
  <meta id="og-image" property="og:image" content="https://www.nishinoumeboshi.com/assets/ogp.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="icon" href="../../favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../style.css">

  <style>
    .post-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }
    .post-breadcrumb {
      font-size: 13px;
      opacity: .75;
      margin-bottom: 20px;
    }
    .post-breadcrumb a {
      text-decoration: underline;
      color: inherit;
    }
    .post-breadcrumb span { opacity: .6; margin: 0 4px; }
    .post-date {
      font-size: 13px;
      opacity: .7;
      margin-bottom: 8px;
    }
    .post-title {
      font-size: clamp(20px, 4vw, 30px);
      line-height: 1.4;
      margin: 0 0 20px;
    }
    .post-hero {
      width: 100%;
      max-width: 860px;
      border-radius: 12px;
      aspect-ratio: 16/9;
      object-fit: cover;
      margin-bottom: 28px;
      display: block;
    }
    .post-body {
      line-height: 1.95;
      font-size: 16px;
    }
    .post-body p { margin: 0 0 1.4em; }
    .post-footer {
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid rgba(0,0,0,.15);
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
    }
    .post-footer a {
      text-decoration: underline;
      color: inherit;
      font-size: 14px;
    }
    .post-footer span { opacity: .4; }
    .post-loading {
      text-align: center;
      padding: 80px 20px;
      opacity: .6;
    }
  </style>
</head>

<body data-page="blog">
<div id="top"></div>

<!-- 共通ヘッダー -->
<div id="shared-header"></div>

<main id="main">
  <div class="post-wrap">

    <!-- パンくず -->
    <nav class="post-breadcrumb">
      <a href="/">トップ</a>
      <span>/</span>
      <a href="../index.html">ブログ・お知らせ</a>
      <span>/</span>
      <span id="bc-title">記事</span>
    </nav>

    <!-- 記事本体（JSで流し込む） -->
    <div id="post-content">
      <p class="post-loading">読み込み中…</p>
    </div>

  </div>

  <!-- 共通フッター -->
  <div id="shared-bottom"></div>
  <a href="#top" class="page-top" aria-label="ページの先頭へ戻る">＾</a>
</main>

<!-- blog/posts/ は2階層下なので ../../common.js -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="../../common.js"></script>
<script>
(async () => {
  const params    = new URLSearchParams(location.search);
  const slug      = params.get('slug') || location.search.replace('?','');
  const contentEl = document.getElementById('post-content');
  const bcTitle   = document.getElementById('bc-title');

  function esc(s){
    return String(s ?? '')
      .replaceAll('&','&amp;').replaceAll('<','&lt;')
      .replaceAll('>','&gt;').replaceAll('"','&quot;');
  }
  function fmtDate(d){
    const m = String(d||'').match(/^(\d{4})-(\d{2})-(\d{2})$/);
    return m ? `${m[1]}.${m[2]}.${m[3]}` : esc(d||'');
  }

  if (!slug) {
    contentEl.innerHTML = '<p>記事が見つかりませんでした。<br><a href="../index.html" style="text-decoration:underline">ブログ一覧へ</a></p>';
    return;
  }

  try {
    const res = await fetch('../posts.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('posts.json 読み込みエラー');
    const posts = (await res.json()).posts;

    const post = posts.find(p => p.slug === slug);
    if (!post) throw new Error('記事が見つかりません: ' + slug);

    // title / meta更新
    document.title = `${post.title}｜食堂 西のうめぼし`;
    document.querySelector('meta[name="description"]')
      ?.setAttribute('content', post.excerpt || '');
    if (bcTitle) bcTitle.textContent = post.title;

    // canonical・OGP動的更新
    const pageUrl = `https://www.nishinoumeboshi.com/blog/posts/post.html?slug=${encodeURIComponent(post.slug)}`;
    document.getElementById('canonical-url')?.setAttribute('href', pageUrl);
    document.getElementById('og-title')?.setAttribute('content', `${post.title}｜食堂 西のうめぼし`);
    document.getElementById('og-description')?.setAttribute('content', post.excerpt || '');
    document.getElementById('og-url')?.setAttribute('content', pageUrl);
    if (post.image) {
      const ogImgSrc = `https://www.nishinoumeboshi.com/blog/${post.image.replace(/^\.\//, '')}`;
      document.getElementById('og-image')?.setAttribute('content', ogImgSrc);
    }

    // BlogPosting 構造化データを動的に挿入
    const schema = {
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "headline": post.title,
      "description": post.excerpt || '',
      "datePublished": post.date || '',
      "url": pageUrl,
      "image": post.image
        ? `https://www.nishinoumeboshi.com/blog/${post.image.replace(/^\.\//, '')}`
        : 'https://www.nishinoumeboshi.com/assets/ogp.jpg',
      "author": {
        "@type": "Organization",
        "name": "食堂 西のうめぼし",
        "url": "https://www.nishinoumeboshi.com/"
      },
      "publisher": {
        "@type": "Organization",
        "name": "食堂 西のうめぼし",
        "url": "https://www.nishinoumeboshi.com/",
        "logo": {
          "@type": "ImageObject",
          "url": "https://www.nishinoumeboshi.com/assets/ogp.jpg"
        }
      },
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": pageUrl
      }
    };
    const schemaScript = document.createElement('script');
    schemaScript.type = 'application/ld+json';
    schemaScript.textContent = JSON.stringify(schema);
    document.head.appendChild(schemaScript);

    // 画像パスの解決
    // posts.jsonは ./images/〇〇.jpg（blog/基準）
    // post.htmlはblog/posts/にあるので ../images/ に変換が必要
    let imgSrc = '';
    if (post.image) {
      imgSrc = post.image.replace(/^\.\//, '../');
    }

    const imgHtml = imgSrc
      ? `<img src="${esc(imgSrc)}" alt="${esc(post.title)}" class="post-hero" loading="lazy">`
      : '';

    // Markdown形式ならHTMLに変換、既存のHTMLはそのまま通す
    const rawBody = post.body || `<p>${esc(post.excerpt)}</p>`;
    const bodyHtml = (typeof marked !== 'undefined' && !rawBody.trimStart().startsWith('<'))
      ? marked.parse(rawBody)
      : rawBody;

    contentEl.innerHTML = `
      <p class="post-date">${fmtDate(post.date)}</p>
      <h1 class="post-title">${esc(post.title)}</h1>
      ${imgHtml}
      <div class="post-body">${bodyHtml}</div>
      <div class="post-footer">
        <a href="../index.html">← ブログ一覧へ戻る</a>
        <span>|</span>
        <a href="/">トップへ</a>
      </div>
    `;

  } catch(e) {
    contentEl.innerHTML = `<p>エラー：${esc(e.message)}<br><a href="../index.html" style="text-decoration:underline">ブログ一覧へ</a></p>`;
    console.error(e);
  }
})();
</script>

</body>
</html>
