backend:
  name: github
  repo: atmos-dining/nishinoumeboshi
  branch: main
  base_url: https://sveltia-cms-auth.atmos-nextgen-team.workers.dev

media_folder: images
public_folder: /images

collections:
  - name: blog_posts
    label: ブログ投稿
    label_singular: ブログ投稿
    folder: blog/posts_data
    create: true
    slug: "{{fields.slug}}"
    summary: "{{fields.date}} | {{fields.title}}"
    fields:
      - {name: slug,    label: Slug（英数字とハイフン）, widget: string}
      - {name: title,   label: タイトル,   widget: string}
      - {name: date,    label: 日付,    widget: datetime, format: "YYYY-MM-DD", time_format: false}
      - {name: excerpt, label: 概要（80文字以内）, widget: text}
      - {name: image,   label: 画像,   widget: image,    required: false}
      - {name: tags,    label: タグ,    widget: list}
      - {name: body,    label: 本文,    widget: markdown}

  - name: blog_index
    label: 投稿インデックス（ブログ一覧用）
    files:
      - name: posts
        label: 全投稿一覧
        file: blog/posts.json
        fields:
          - name: posts
            label: 投稿リスト
            widget: list
            fields:
              - {name: slug,    label: Slug,    widget: string}
              - {name: title,   label: タイトル,   widget: string}
              - {name: date,    label: 日付,    widget: datetime, format: "YYYY-MM-DD", time_format: false}
              - {name: excerpt, label: 概要,    widget: text}
              - {name: image,   label: 画像,   widget: image,    required: false}
              - {name: tags,    label: タグ,    widget: list}
              - {name: body,    label: 本文,    widget: markdown}
